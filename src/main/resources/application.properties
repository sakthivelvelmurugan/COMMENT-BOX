spring.application.name=commentbox-api
spring.config.import=optional:dotenv:.env

# Server
server.port=8080

# OpenRouter
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.model=${OPENROUTER_MODEL:openai/gpt-4o-mini}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5500}

# Secrets (allow empty defaults for local development)
jwt.secret=${JWT_SECRET:}
byok.secret=${BYOK_SECRET:}
byok.encryption.secret=${BYOK_SECRET_KEY:}

# Actuator
management.endpoints.web.exposure.include=health