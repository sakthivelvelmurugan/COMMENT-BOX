spring.application.name=commentbox-api

# Server
server.port=8081

# Datasource - use Postgres via env vars, fallback to H2 for local dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# OpenRouter
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.model=${OPENROUTER_MODEL:openai/gpt-4o-mini}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5500}

# Secrets (allow empty defaults for local development)
jwt.secret=${JWT_SECRET:}
byok.secret=${BYOK_SECRET:}
byok.encryption.secret=${BYOK_SECRET_KEY:}

# Actuator
management.endpoints.web.exposure.include=health