<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account — CommentBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="register">
  <header class="navbar">
    <div class="nav-inner">
      <a href="/index.html" class="logo-wrap">
        <svg class="logo-svg" width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="38" height="38" rx="10" fill="var(--accent)" />
          <rect x="7" y="7" width="22" height="16" rx="4" fill="var(--logo-bubble)" />
          <path d="M12 23 L10 30 L18 25" fill="var(--logo-bubble)" />
          <rect x="11" y="11" width="6" height="2" rx="1" fill="var(--logo-line1)" />
          <rect x="11" y="15" width="10" height="2" rx="1" fill="var(--logo-line2)" />
          <text x="20" y="22" font-size="8" font-family="monospace" fill="var(--logo-bracket)" font-weight="700">{}</text>
        </svg>
        <span class="logo-text">comment<span class="logo-accent">box</span></span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Open navigation"><span></span><span></span><span></span></button>
      <nav class="nav-links">
        <a href="/index.html" class="nav-link" data-page="editor">Editor</a>
        <a href="/dashboard.html" class="nav-link" data-page="dashboard">Dashboard</a>
        <a href="/docs.html" class="nav-link" data-page="docs">Docs</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="theme-icon sun"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
          <span class="theme-icon moon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        </button>
      </div>
    </div>
  </header>

  <main class="form-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <svg width="40" height="40" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="38" height="38" rx="10" fill="var(--accent)"/><path d="M10 12h18v10H10z" fill="var(--surface)"/></svg>
        <div>
          <p class="eyebrow">CommentBox</p>
          <h1>Create your account</h1>
        </div>
      </div>

      <form id="registerForm" class="auth-form" novalidate>
        <div id="registerError" class="error-panel" hidden></div>
        <label class="field-label" for="registerEmail">Email</label>
        <input id="registerEmail" name="email" type="email" inputmode="email" required placeholder="you@example.com" aria-label="Email" />

        <label class="field-label" for="registerPassword">Password</label>
        <div class="password-group">
          <input id="registerPassword" name="password" type="password" required minlength="8" placeholder="Create password" aria-label="Password" />
          <button class="password-toggle" type="button" id="registerTogglePassword" aria-label="Show password">Show</button>
        </div>
        <div class="strength-meter">
          <div class="strength-bar" id="passwordStrengthBar"></div>
          <span class="strength-label" id="passwordStrengthLabel">Enter a password with at least 8 characters.</span>
        </div>

        <label class="field-label" for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" name="confirm" type="password" required minlength="8" placeholder="Repeat password" aria-label="Confirm password" />

        <button class="btn-primary btn-block" id="registerSubmit" type="submit">Create account</button>
      </form>

      <p class="auth-note">Already have an account? <a href="/login.html">Sign in</a></p>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
